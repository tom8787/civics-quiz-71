with that.", "It's your turn to close it."], "answer": 2, "passage": null}, {"id": 35, "section": "Unit 4｜勾選題目", "kind": "對話選擇", "source": "習作 p.29（紅勾題目）", "prompt": "Shirley: There are strangers making nasty remarks on my Instagram post.<br>Becky: Oh no! What are you going to do?<br>Shirley: I want to make my account private so that only my friends can see my posts, but I don't know how to do it.<br>Becky: ______<br>Shirley: Thanks. You're truly my best friend.", "choices": ["It's not my fault.", "Let me give you a hand.", "I don't know how to do it, either.", "My bad! I apologize to you."], "answer": 1, "passage": null}, {"id": 36, "section": "Unit 4｜勾選題目", "kind": "對話選擇", "source": "習作 p.29（紅勾題目）", "prompt": "Ben: Justin... I really need your help.<br>Justin: Hey, don't cry. Tell me what happened.<br>Ben: Sammy made fun of my new hairstyle and said it looks silly.<br>Justin: ______ You look great.<br>Ben: Okay. I'll just ignore her.", "choices": ["Don't take it to heart.", "That sounds nice!", "She is an honest person.", "You're telling me!"], "answer": 0, "passage": null}, {"id": 37, "section": "Unit 4｜勾選題目", "kind": "對話選擇", "source": "習作 p.29（紅勾題目）", "prompt": "Mike: Do you have a minute? If so, ______ I've never done this before.<br>Sandy: Sure! I'd be happy to help. Just give the receptionist your personal information, the arrival date, room type, and your credit card number.<br>Mike: Okay. I'll give it a try. I think I can do it. Thank you.", "choices": ["I could use your help setting up my new phone.", "I really could use some help with the hotel reservation.", "I could use your help confirming the reservation e-mail.", "I really need your advice on picking the right arrival date."], "answer": 1, "passage": null}, {"id": 38, "section": "Unit 4｜勾選題目", "kind": "閱讀理解", "source": "習作 p.30（紅勾題目）", "prompt": "Which of the following is the best title for this passage?", "choices": ["The Definition of Cyberbullying", "Solutions to Cyberbullying", "Effective Ways of Cyberbullying", "A New Method of Cyberbullying"], "answer": 1, "passage": "Unfortunately, many teenagers experience cyberbullying. Bullies often try to amuse others with hurtful comments about someone's posts or pictures. However, these “jokes” are meant to hurt a person and make everyone laugh at him or her. To protect themselves, teenagers can take a number of actions, including the following.<br><br>\nFirst, they can peacefully reply to the bullies' comments and clearly state that their behavior is hurtful. If the bullies continue, then the victims can choose to block them. Also, most social networking sites allow users to choose a list of “close friends,” who are the only ones that can view their posts and make comments. This feature can help protect users from unwanted attention and limit interactions with bullies. In addition, if teenagers are upset, they can seek emotional support from someone they trust. Finally, bullies can be reported to the police, who can take legal action against them.<br><br>\nIt is not easy to deal with cyberbullying, yet teenagers should realize that effective action is possible and that they can make a difference by being fearless."}, {"id": 39, "section": "Unit 4｜勾選題目", "kind": "閱讀理解", "source": "習作 p.30（紅勾題目）", "prompt": "Which of the following is NOT mentioned as a protection from cyberbullying?", "choices": ["Blocking bullies.", "Calling bullies out and fighting back.", "Seeking emotional support from someone you trust.", "Replying to bullies' messages to tell them not to do it again."], "answer": 1, "passage": "Unfortunately, many teenagers experience cyberbullying. Bullies often try to amuse others with hurtful comments about someone's posts or pictures. However, these “jokes” are meant to hurt a person and make everyone laugh at him or her. To protect themselves, teenagers can take a number of actions, including the following.<br><br>\nFirst, they can peacefully reply to the bullies' comments and clearly state that their behavior is hurtful. If the bullies continue, then the victims can choose to block them. Also, most social networking sites allow users to choose a list of “close friends,” who are the only ones that can view their posts and make comments. This feature can help protect users from unwanted attention and limit interactions with bullies. In addition, if teenagers are upset, they can seek emotional support from someone they trust. Finally, bullies can be reported to the police, who can take legal action against them.<br><br>\nIt is not easy to deal with cyberbullying, yet teenagers should realize that effective action is possible and that they can make a difference by being fearless."}, {"id": 40, "section": "Unit 4｜勾選題目", "kind": "閱讀理解", "source": "習作 p.30（紅勾題目）", "prompt": "Which of the following can be inferred from the passage?", "choices": ["There is nothing we can do about cyberbullying.", "We should hide ourselves when being bullied.", "We had better quit using every social networking site.", "It's not easy to fight against cyberbullying, but we can still take action."], "answer": 3, "passage": "Unfortunately, many teenagers experience cyberbullying. Bullies often try to amuse others with hurtful comments about someone's posts or pictures. However, these “jokes” are meant to hurt a person and make everyone laugh at him or her. To protect themselves, teenagers can take a number of actions, including the following.<br><br>\nFirst, they can peacefully reply to the bullies' comments and clearly state that their behavior is hurtful. If the bullies continue, then the victims can choose to block them. Also, most social networking sites allow users to choose a list of “close friends,” who are the only ones that can view their posts and make comments. This feature can help protect users from unwanted attention and limit interactions with bullies. In addition, if teenagers are upset, they can seek emotional support from someone they trust. Finally, bullies can be reported to the police, who can take legal action against them.<br><br>\nIt is not easy to deal with cyberbullying, yet teenagers should realize that effective action is possible and that they can make a difference by being fearless."}, {"id": 41, "section": "Unit 4｜勾選題目", "kind": "閱讀理解", "source": "閱讀素養練習 p.31（紅勾題目）", "prompt": "Which of the following can be inferred from the passage?", "choices": ["When being bullied, the victim should avoid talking about it.", "Delete any threatening messages and pictures because they are horrible.", "It would be better to find out who the bully is and talk to him or her one on one.", "Reporting bullies to the owners of the website is an effective way of dealing with cyberbullying."], "answer": 3, "passage": "With more and more people getting hurt, cyberbullying has become a serious problem. Everyone should do everything possible to fight against it, and we can start by caring about people around us. There are signs when people may be experiencing cyberbullying.<br><br>\nFor example, they may be nervous when receiving messages or upset after using the Internet. Failing to fall asleep, loss of appetite, or avoiding social gatherings can all be signs of being bullied. If you notice any changes in the mood or behavior of someone close to you, encourage them to talk about it.<br><br>\nHere are some ways to protect your friends from bullies. Tell them to simply ignore the messages and block the bully. If possible, collect the threatening messages and pictures as evidence. Report the bully to the website owners and take legal action.<br><br>\nAs for your friends, tell them that it's not their fault, and give them your support. Encourage them to talk to someone they trust and reach out to anyone who can be of assistance. Everyone might be bullied at some point, in some way. The most important thing to do is deal with it correctly and effectively."}, {"id": 42, "section": "Unit 4｜勾選題目", "kind": "片語填空", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "Alice has really ______ video games recently. She often hangs out at Internet cafés after school.", "choices": ["gone in for", "so far", "out of order", "turned to"], "answer": 0, "passage": null}, {"id": 43, "section": "Unit 4｜勾選題目", "kind": "片語填空", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "Mavis has earned NT$500 ______, but she still needs more to buy a concert ticket.", "choices": ["gone in for", "so far", "out of order", "keep away"], "answer": 1, "passage": null}, {"id": 44, "section": "Unit 4｜勾選題目", "kind": "片語填空", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "The old machine in the factory is ______ and needs to be repaired immediately.", "choices": ["gone in for", "so far", "out of order", "make fun of"], "answer": 2, "passage": null}, {"id": 45, "section": "Unit 4｜勾選題目", "kind": "文法選擇", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "Any cosmetics ______ with LINE Pay earned me extra LINE Points.", "choices": ["buy", "buying", "bought", "that bought"], "answer": 2, "passage": null}, {"id": 46, "section": "Unit 4｜勾選題目", "kind": "文法選擇", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "My mother ______ dinner for three hours, but it's still not ready even now.", "choices": ["cook", "will cook", "had cooked", "has been cooking"], "answer": 3, "passage": null}, {"id": 47, "section": "Unit 4｜勾選題目", "kind": "文法選擇", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "It is the movie star ______ is reported to be having an affair with a married man.", "choices": ["who", "whom", "which", "whose"], "answer": 0, "passage": null}, {"id": 48, "section": "Unit 4｜勾選題目", "kind": "文法選擇", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "Nowadays, youngsters ______ for solutions online whenever they have problems.", "choices": ["used to look", "are used to looking", "are used to look", "be used to looking"], "answer": 1, "passage": null}, {"id": 49, "section": "Unit 4｜勾選題目", "kind": "文法選擇", "source": "Unit 4 練習 p.34（紅勾題目）", "prompt": "It's raining heavily. I ______ not walk to school today because my shoes will get soaked.", "choices": ["prefer", "prefer that", "would like", "would rather"], "answer": 3, "passage": null}, {"id": 50, "section": "Unit 5｜勾選題目", "kind": "對話選擇", "source": "Unit 5 練習 p.36（紅勾題目）", "prompt": "Victor: Can I pay with my smartphone?<br>Clerk: Sure. ______<br>Victor: That's great! How do I do it?<br>Clerk: Please open the app and show me the QR code on your phone.", "choices": ["In cash or by credit cards?", "I need to know your identity.", "Can you show your mobile app?", "We now accept mobile payments."], "answer": 3, "passage": null}, {"id": 51, "section": "Unit 5｜勾選題目", "kind": "對話選擇", "source": "Unit 5 練習 p.36–37（紅勾題目）", "prompt": "Stacy: ______<br>Clerk: Sure, it's $120 in total. Please hold the barcode in front of the scanner.<br>Stacy: Well, it seems that my barcode is not scanning properly.<br>Clerk: Could you move it a bit closer, please?", "choices": ["I would like to pay with LINE Pay.", "I would like to see the menu, please.", "Can you give me a coupon before I pay?", "How many reward points do I have in my account?"], "answer": 0, "passage": null}, {"id": 52, "section": "Unit 5｜勾選題目", "kind": "對話選擇", "source": "Unit 5 練習 p.37（紅勾題目）", "prompt": "Jill: There's a green check on the screen. Does that mean the transaction is completed?<br>Clerk: Yes, it does. Would you like me to print out your invoice?<br>Jill: Yes, please.<br>Clerk: ______", "choices": ["Here you are.", "You're welcome.", "That's very kind of you.", "I can't read your fingerprint."], "answer": 0, "passage": null}, {"id": 53, "section": "Unit 5｜勾選題目", "kind": "對話選擇", "source": "Unit 5 練習 p.37（紅勾題目）", "prompt": "Clerk: Your caramel macchiato is NT$150. Are you paying with your Starbucks app?<br>Customer: Yes, that's right. I want to collect my Stars.<br>Clerk: Got it. ______<br>Customer: Done.<br>Clerk: Thanks! Your Stars have been added.", "choices": ["Please pay in cash.", "You can keep the change.", "Don't pay with electronic money.", "Please tap your smartphone on the machine."], "answer": 3, "passage": null}, {"id": 54, "section": "Unit 5｜勾選題目", "kind": "對話選擇", "source": "Unit 5 練習 p.37（紅勾題目）", "prompt": "Clerk: The total is NT$1550.<br>Teresa: Okay, I'll pay with Google Pay.<br>Clerk: I can't scan it. ______ so that I can scan the code?<br>Teresa: Oh, sure. Is this better?<br>Clerk: Perfect! It went through. Here's your receipt.", "choices": ["Do you have a mobile barcode for the e-invoice?", "Could you adjust the screen brightness?"], "answer": 1, "passage": null}, {"id": 55, "section": "Unit 5｜勾選題目", "kind": "文法選擇", "source": "Unit 5 Multiple Choice p.139（紅勾題目，第 1 題）", "prompt": "It was Leo ______ helped me the most.", "choices": ["whom", "what", "when", "that"], "answer": 3, "passage": null}, {"id": 56, "section": "Unit 5｜勾選題目", "kind": "文法選擇", "source": "Unit 5 Multiple Choice p.139（紅勾題目，第 2 題）", "prompt": "I like the picture ______ by my little brother.", "choices": ["paint", "painting", "to paint", "painted"], "answer": 3, "passage": null}, {"id": 57, "section": "Unit 5｜勾選題目", "kind": "文法選擇", "source": "Unit 5 Multiple Choice p.139（紅勾題目，第 3 題）", "prompt": "It ______ yesterday that we had a math test.", "choices": ["is", "will be", "was", "has been"], "answer": 2, "passage": null}, {"id": 58, "section": "Unit 5｜勾選題目", "kind": "文法選擇", "source": "Unit 5 Multiple Choice p.139（紅勾題目，第 4 題）", "prompt": "The cake ______ by Grandma tastes so good.", "choices": ["make", "making", "to make", "made"], "answer": 3, "passage": null}, {"id": 59, "section": "Unit 5｜勾選題目", "kind": "文法選擇", "source": "Unit 5 Multiple Choice p.139（紅勾題目，第 5 題）", "prompt": "It was ______ that the movie started.", "choices": ["at 7 p.m.", "7 p.m.", "started at", "started"], "answer": 0, "passage": null}];
const LETTERS = ["A","B","C","D"];
let pool=[], current=0, answers={}, checked={}, mistakes=[];
const $=id=>document.getElementById(id);
function escapeHTML(text){return String(text).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));}
function shuffle(arr){const a=[...arr];for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function setupSections(){const counts={};BANK.forEach(q=>counts[q.section]=(counts[q.section]||0)+1);const names=["全部題庫","Unit 4｜圈選單字","Unit 4｜勾選題目","Unit 5｜圈選單字","Unit 5｜勾選題目"];$("sectionSelect").innerHTML=names.map(n=>n==="全部題庫"?`<option value="all">全部題庫（${BANK.length} 題）</option>`:`<option value="${n}">${n}（${counts[n]||0} 題）</option>`).join("");}
function startRound(custom=null){const section=$("sectionSelect").value,order=$("modeSelect").value,count=$("countSelect").value;let items=custom?[...custom]:BANK.filter(q=>section==="all"||q.section===section);if(order==="random"||count!=="all")items=shuffle(items);if(count!=="all")items=items.slice(0,Math.min(Number(count),items.length));pool=items;current=0;answers={};checked={};mistakes=[];$("summaryPanel").style.display="none";render();}
function render(){if(!pool.length)return;const q=pool[current];$("sectionBadge").textContent=q.section;$("progressCopy").textContent=`第 ${current+1} 題／共 ${pool.length} 題｜${q.kind}`;$("progressBar").style.width=`${((current+1)/pool.length)*100}%`;$("sourceText").textContent=q.source;$("questionText").innerHTML=q.prompt;const p=$("passageBox");if(q.passage){p.innerHTML=`<strong>閱讀短文</strong><br><br>${q.passage}`;p.style.display="block";}else{p.style.display="none";p.innerHTML="";}const selected=answers[q.id],isChecked=checked[q.id]===true;$("optionsBox").innerHTML=q.choices.map((choice,i)=>{let cls="option";if(selected===i)cls+=" selected";if(isChecked&&i===q.answer)cls+=" correct";if(isChecked&&selected===i&&i!==q.answer)cls+=" wrong";return `<label class="${cls}"><input type="radio" name="answer" value="${i}" ${selected===i?"checked":""}><span class="letter">${LETTERS[i]||i+1}</span><span class="option-text">${escapeHTML(choice)}</span></label>`;}).join("");document.querySelectorAll('input[name="answer"]').forEach(el=>el.addEventListener("change",e=>{answers[q.id]=Number(e.target.value);checked[q.id]=true;render();}));const fb=$("feedbackBox");fb.className="feedback";fb.textContent="";if(isChecked){if(selected===q.answer){fb.className="feedback show good";fb.textContent=`✓ 答對了！正確答案：${LETTERS[q.answer]||q.answer+1}．${q.choices[q.answer]}`;}else{fb.className="feedback show bad";fb.textContent=`✗ 正確答案：${LETTERS[q.answer]||q.answer+1}．${q.choices[q.answer]}`;}}$("prevBtn").disabled=current===0;$("nextBtn").disabled=current===pool.length-1;renderGrid();}
function renderGrid(){$("questionGrid").innerHTML=pool.map((q,i)=>{let c="dot";if(i===current)c+=" active";if(answers[q.id]!==undefined)c+=" done";if(checked[q.id]&&answers[q.id]!==q.answer)c+=" wrong";return `<button class="${c}" data-index="${i}" title="第 ${i+1} 題">${i+1}</button>`;}).join("");document.querySelectorAll(".dot").forEach(b=>b.addEventListener("click",()=>{current=Number(b.dataset.index);render();$("quizPanel").scrollIntoView({behavior:"smooth",block:"start"});}));}
function checkCurrent(){if(!pool.length)return;const q=pool[current],fb=$("feedbackBox");if(answers[q.id]===undefined){fb.className="feedback show info";fb.textContent="請先選擇一個答案。";return;}checked[q.id]=true;render();}
function submitRound(){if(!pool.length)return;const answered=pool.filter(q=>answers[q.id]!==undefined).length,correct=pool.filter(q=>answers[q.id]===q.answer).length;mistakes=pool.filter(q=>answers[q.id]!==q.answer);$("scoreText").textContent=`${correct} / ${pool.length}`;$("scoreDetail").textContent=`已作答 ${answered} 題；答對 ${correct} 題；正確率 ${Math.round(correct/pool.length*100)}%。`;$("mistakeBox").innerHTML=mistakes.length?`<div class="mistakes"><strong>需複習：${mistakes.length} 題</strong><br>錯題或未作答題號：${mistakes.map(q=>pool.indexOf(q)+1).join("、")}</div>`:`<div class="mistakes"><strong>太棒了，這一回全數答對！</strong><br>可以改選其他單元或使用隨機模式再練一次。</div>`;$("summaryPanel").style.display="block";$("summaryPanel").scrollIntoView({behavior:"smooth",block:"start"});}
$("startBtn").addEventListener("click",()=>startRound());$("prevBtn").addEventListener("click",()=>{if(current>0){current--;render();}});$("nextBtn").addEventListener("click",()=>{if(current<pool.length-1){current++;render();}});$("checkBtn").addEventListener("click",checkCurrent);$("submitBtn").addEventListener("click",submitRound);$("resetBtn").addEventListener("click",()=>{if(confirm("確定要清除本回所有作答紀錄嗎？")){answers={};checked={};mistakes=[];render();}});$("retryBtn").addEventListener("click",()=>{if(!mistakes.length){alert("本回沒有錯題可重練。");return;}$("modeSelect").value="random";$("countSelect").value="all";startRound(mistakes);$("quizPanel").scrollIntoView({behavior:"smooth",block:"start"});});$("newRoundBtn").addEventListener("click",()=>window.scrollTo({top:0,behavior:"smooth"}));
setupSections();startRound();
