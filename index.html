<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>體育認知刷題網站</title>
  <style>
    :root{
      --bg:#f6f4ef;
      --paper:#fffdf9;
      --ink:#2d2d2d;
      --sub:#6b6b6b;
      --line:#d8d1c5;
      --accent:#6a7a5d;
      --accent-soft:#eef3e8;
      --wrong:#b14a42;
      --wrong-soft:#faecea;
      --right:#2f7d4a;
      --right-soft:#ebf7ef;
      --chip:#f2eee7;
    }
    *{box-sizing:border-box;}
    body{
      margin:0;
      font-family:"Noto Sans TC","Microsoft JhengHei",sans-serif;
      background:var(--bg);
      color:var(--ink);
      line-height:1.75;
    }
    .wrap{
      max-width:980px;
      margin:0 auto;
      padding:24px 16px 48px;
    }
    .hero{
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:14px;
      padding:22px 22px 16px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
      margin-bottom:18px;
    }
    h1{
      margin:0 0 8px;
      font-size:30px;
      letter-spacing:.5px;
    }
    .subtitle{
      margin:0;
      color:var(--sub);
      font-size:15px;
    }
    .note{
      margin-top:10px;
      color:var(--sub);
      font-size:14px;
    }
    .toolbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin:18px 0 0;
    }
    button{
      border:1px solid #bdb5a7;
      background:#fff;
      color:var(--ink);
      padding:9px 14px;
      border-radius:10px;
      cursor:pointer;
      font-size:14px;
    }
    button:hover{background:#f8f6f1;}
    .summary{
      margin-top:16px;
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
      gap:10px;
    }
    .stat{
      background:var(--chip);
      border:1px solid var(--line);
      border-radius:12px;
      padding:12px 14px;
    }
    .stat .label{color:var(--sub);font-size:13px;}
    .stat .value{font-size:24px;font-weight:700;}
    .section{
      margin-top:22px;
      background:var(--paper);
      border:1px solid var(--line);
      border-radius:14px;
      padding:18px 18px 8px;
      box-shadow:0 8px 24px rgba(0,0,0,.04);
    }
    .section h2{
      margin:0 0 12px;
      font-size:22px;
      border-left:5px solid var(--accent);
      padding-left:10px;
    }
    .q-card{
      border-top:1px dashed var(--line);
      padding:16px 0 14px;
    }
    .q-card:first-of-type{border-top:none;padding-top:6px;}
    .q-head{
      display:flex;
      gap:10px;
      align-items:flex-start;
      margin-bottom:8px;
    }
    .q-no{
      flex:none;
      width:42px;
      height:42px;
      border-radius:50%;
      border:1px solid #c8c0b4;
      background:#fbfaf7;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:700;
      font-size:15px;
    }
    .q-title{
      flex:1;
      font-size:16px;
      margin-top:4px;
    }
    .from{
      color:var(--sub);
      font-size:13px;
      margin-top:2px;
    }
    .options{
      display:grid;
      gap:8px;
      margin:10px 0 4px 52px;
    }
    .option{
      display:flex;
      align-items:flex-start;
      gap:10px;
      padding:10px 12px;
      background:#fff;
      border:1px solid #ddd6c9;
      border-radius:10px;
    }
    .option:hover{background:#fcfbf8;}
    .option input{margin-top:4px;}
    .feedback{
      margin:8px 0 0 52px;
      padding:10px 12px;
      border-radius:10px;
      font-size:14px;
      display:none;
    }
    .feedback.show{display:block;}
    .feedback.correct{
      background:var(--right-soft);
      border:1px solid #b7dec3;
      color:var(--right);
    }
    .feedback.wrong{
      background:var(--wrong-soft);
      border:1px solid #e5c0bc;
      color:var(--wrong);
    }
    .pill{
      display:inline-block;
      font-size:12px;
      color:var(--sub);
      background:var(--chip);
      border:1px solid var(--line);
      padding:2px 8px;
      border-radius:999px;
      margin-left:6px;
      vertical-align:middle;
    }
    .footer-tip{
      margin-top:18px;
      color:var(--sub);
      font-size:13px;
      text-align:center;
    }
    .hidden{display:none !important;}
    @media (max-width:700px){
      h1{font-size:24px;}
      .section{padding:16px 14px 6px;}
      .options,.feedback{margin-left:0;}
      .q-head{display:block;}
      .q-no{margin-bottom:8px;}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <h1>體育認知刷題網站</h1>
    <p class="subtitle">依你上傳的兩頁題目整理成可直接練習的版本，共 40 題。</p>
    <p class="note">版面刻意做得比較樸素、像一般學校練習網站；答錯時會立即顯示正確答案。若原題是圖片題，這裡保留成文字題目。</p>
    <div class="toolbar">
      <button onclick="showAll()">顯示全部題目</button>
      <button onclick="showWrongOnly()">只看答錯題</button>
      <button onclick="jumpToUnanswered()">跳到未作答</button>
      <button onclick="checkAll()">交卷統計</button>
      <button onclick="resetQuiz()">重新作答</button>
    </div>
    <div class="summary">
      <div class="stat"><div class="label">總題數</div><div class="value" id="totalCount">40</div></div>
      <div class="stat"><div class="label">已作答</div><div class="value" id="answeredCount">0</div></div>
      <div class="stat"><div class="label">答對</div><div class="value" id="correctCount">0</div></div>
      <div class="stat"><div class="label">答錯</div><div class="value" id="wrongCount">0</div></div>
    </div>
  </div>

  <div id="sections"></div>
  <div class="footer-tip">本頁為單一 HTML 檔，直接放到 GitHub Pages 即可使用。</div>
</div>

const sectionsEl = document.getElementById('sections');
const state = {};

function groupBySection(data){
  const grouped = {};
  data.forEach(item=>{
    if(!grouped[item.sec]) grouped[item.sec]=[];
    grouped[item.sec].push(item);
  });
  return grouped;
}

function render(){
  const grouped = groupBySection(quizData);
  sectionsEl.innerHTML = '';
  Object.entries(grouped).forEach(([sec, items])=>{
    const section = document.createElement('section');
    section.className = 'section';
    section.dataset.section = sec;
    section.innerHTML = `<h2>${sec} <span class="pill">${items.length} 題</span></h2>`;

    items.forEach(item=>{
      const card = document.createElement('div');
      card.className = 'q-card';
      card.id = `q-${item.n}`;
      card.dataset.no = item.n;
      card.dataset.answer = item.answer;
      card.dataset.status = 'unanswered';

      const optionsHtml = Object.entries(item.opts).map(([key, text]) => `
        <label class="option">
          <input type="radio" name="q${item.n}" value="${key}" onchange="selectAnswer(${item.n}, '${key}')">
          <span><strong>${key}.</strong> ${text}</span>
        </label>
      `).join('');

      card.innerHTML = `
        <div class="q-head">
          <div class="q-no">${item.n}</div>
          <div>
            <div class="q-title">${item.q}</div>
            <div class="from">${item.ref}</div>
          </div>
        </div>
        <div class="options">${optionsHtml}</div>
        <div class="feedback" id="fb-${item.n}"></div>
      `;
      section.appendChild(card);
    });
    sectionsEl.appendChild(section);
  });
  updateSummary();
}

function selectAnswer(no, choice){
  const item = quizData.find(q => q.n === no);
  state[no] = choice;
  const fb = document.getElementById(`fb-${no}`);
  const card = document.getElementById(`q-${no}`);
  if(choice === item.answer){
    fb.className = 'feedback show correct';
    fb.innerHTML = `答對了，正確答案是 <strong>${item.answer}</strong>。`;
    card.dataset.status = 'correct';
  }else{
    fb.className = 'feedback show wrong';
    fb.innerHTML = `答錯了，你選的是 <strong>${choice}</strong>；正確答案是 <strong>${item.answer}</strong>。`;
    card.dataset.status = 'wrong';
  }
  updateSummary();
}

function updateSummary(){
  const total = quizData.length;
  let answered = 0, correct = 0, wrong = 0;
  quizData.forEach(item => {
    const value = state[item.n];
    if(value){
      answered++;
      if(value === item.answer) correct++;
      else wrong++;
    }
  });
  document.getElementById('totalCount').textContent = total;
  document.getElementById('answeredCount').textContent = answered;
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
}

function showAll(){
  document.querySelectorAll('.q-card').forEach(card => card.classList.remove('hidden'));
}

function showWrongOnly(){
  document.querySelectorAll('.q-card').forEach(card => {
    card.classList.toggle('hidden', card.dataset.status !== 'wrong');
  });
}

function jumpToUnanswered(){
  const first = quizData.find(item => !state[item.n]);
  if(!first){
    alert('目前所有題目都已作答。');
    return;
  }
  showAll();
  document.getElementById(`q-${first.n}`).scrollIntoView({behavior:'smooth', block:'center'});
}

function checkAll(){
  const unanswered = quizData.filter(item => !state[item.n]).length;
  const correct = quizData.filter(item => state[item.n] && state[item.n] === item.answer).length;
  const wrong = quizData.filter(item => state[item.n] && state[item.n] !== item.answer).length;
  const answered = correct + wrong;
  const rate = answered ? Math.round((correct / quizData.length) * 100) : 0;
  alert(`作答完成統計\n\n總題數：${quizData.length} 題\n已作答：${answered} 題\n未作答：${unanswered} 題\n答對：${correct} 題\n答錯：${wrong} 題\n得分率：${rate}%`);
}

function resetQuiz(){
  if(!confirm('確定要清除目前作答紀錄嗎？')) return;
  Object.keys(state).forEach(k => delete state[k]);
  document.querySelectorAll('input[type="radio"]').forEach(input => input.checked = false);
  document.querySelectorAll('.feedback').forEach(fb => {
    fb.className = 'feedback';
    fb.textContent = '';
  });
  document.querySelectorAll('.q-card').forEach(card => {
    card.dataset.status = 'unanswered';
    card.classList.remove('hidden');
  });
  updateSummary();
  window.scrollTo({top:0, behavior:'smooth'});
}

render();
</script>
</body>
</html>
